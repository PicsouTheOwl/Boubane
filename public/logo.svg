<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="boubane-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="boubane-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#boubane-grad-dark)"/>
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#boubane-grad)" opacity="0.9"/>

  <!-- Subtle inner glow -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Letter B stylized with connection nodes -->
  <!-- B shape -->
  <path d="M160 128 L160 384 L280 384 C346 384 384 350 384 300 C384 260 360 236 320 228 C352 220 376 196 376 164 C376 120 340 128 280 128 Z M216 176 L272 176 C304 176 320 192 320 212 C320 232 304 248 272 248 L216 248 Z M216 296 L280 296 C320 296 336 316 336 340 C336 364 320 376 280 376 L216 376 Z" fill="white" filter="url(#glow)"/>

  <!-- Connection dots (agent network metaphor) -->
  <circle cx="384" cy="164" r="12" fill="#22d3ee" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="200" r="8" fill="#22d3ee" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="392" cy="136" r="6" fill="#818cf8" opacity="0.7">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Connection lines -->
  <line x1="376" y1="164" x2="320" y2="164" stroke="#22d3ee" stroke-width="2" opacity="0.4"/>
  <line x1="384" y1="176" x2="384" y2="200" stroke="#22d3ee" stroke-width="2" opacity="0.3"/>
</svg>
